<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ReplyPilot</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 14px; font-size: 13px; color: #222; background: #fff; }
    h3 { margin: 0 0 10px; font-size: 14px; font-weight: 600; }
    h4 { margin: 8px 0 4px; font-size: 13px; font-weight: 600; }
    .card { padding: 10px; background: #f7f8fa; border: 1px solid #e4e6ea; border-radius: 6px; margin-bottom: 10px; }
    .muted { color: #888; }
    .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 2px; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .row .label { min-width: 70px; }
    button { padding: 6px 12px; border: 0; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
    button.primary { background: #0d6efd; color: #fff; }
    button.primary:hover { background: #0b5ed7; }
    button.primary:disabled { background: #9bc0f5; cursor: not-allowed; }
    button.secondary { background: #fff; border: 1px solid #ced4da; color: #222; }
    button.secondary:hover { background: #f1f3f5; }
    select { width: 100%; padding: 6px 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; }
    .ok { color: #198754; }
    .err { color: #dc3545; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .badge.green { background: #d1e7dd; color: #0f5132; }
    .badge.blue { background: #cfe2ff; color: #084298; }
    a { color: #0d6efd; text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr { border: 0; border-top: 1px solid #e4e6ea; margin: 10px 0; }
  </style>
</head>
<body>
  <h3>ReplyPilot</h3>
  <div id="content">
    <div class="muted">Loading...</div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
