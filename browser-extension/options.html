<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ReplyPilot Options</title>
  <style>
    body { font-family: -apple-system, Segoe UI, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 20px; color: #222; }
    h2 { font-size: 18px; }
    label { display: block; margin-top: 16px; font-weight: 600; font-size: 14px; }
    input[type=text] { width: 100%; padding: 8px 10px; font-family: monospace; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 8px 14px; background: #0d6efd; color: #fff; border: 0; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #0b5ed7; }
    .muted { color: #888; font-size: 13px; margin-top: 8px; }
    .ok { color: #198754; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>ReplyPilot Extension</h2>
  <p class="muted">Paste your API token from ReplyPilot Settings. This lets the extension send scraped Maps data back to your account.</p>

  <label for="token">API token</label>
  <input type="text" id="token" placeholder="rp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
  <button id="save">Save</button>
  <div id="result"></div>

  <script src="options.js"></script>
</body>
</html>
